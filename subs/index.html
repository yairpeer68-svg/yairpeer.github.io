<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>מנוימטר — כל המנויים שלך במקום אחד</title>
<meta name="description" content="מעקב מנויים בעברית: גלה כמה אתה משלם כל חודש על נטפליקס, ספוטיפיי, חדר כושר וכל שאר המנויים — וקבל תזכורת לפני כל חידוש.">
<meta property="og:title" content="מנוימטר — כמה המנויים שלך באמת עולים לך?">
<meta property="og:description" content="מעקב מנויים חינמי בעברית. הנתונים נשמרים אצלך במכשיר.">
<meta name="theme-color" content="#0e0a1f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0a1f;
    --bg-glow-1: rgba(109, 40, 217, .35);
    --bg-glow-2: rgba(217, 38, 169, .18);
    --card: #191330;
    --card-2: #221a3e;
    --text: #f4f1ff;
    --muted: #9d94c0;
    --lime: #d4f537;
    --lime-dark: #0f1203;
    --violet: #6d28d9;
    --fuchsia: #d926a9;
    --pink: #ff2e88;
    --border: #2c2350;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Rubik", -apple-system, "Segoe UI", Arial, sans-serif;
    background:
      radial-gradient(600px 400px at 85% -5%, var(--bg-glow-1), transparent 70%),
      radial-gradient(500px 380px at -10% 30%, var(--bg-glow-2), transparent 70%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 14px 16px 130px; }

  /* ---- top bar ---- */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 2px 4px; }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 18px; letter-spacing: -.3px; }
  .brand .coin {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg); border: 2.5px solid var(--lime);
    color: var(--lime); font-size: 15px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }
  .topbar .actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit;
  }
  .icon-btn.on { border-color: var(--lime); box-shadow: 0 0 10px rgba(212, 245, 55, .25); }
  #btnInstall { display: none; }

  /* ---- hero ---- */
  .hero {
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--violet), var(--fuchsia));
    border-radius: 24px;
    padding: 26px 18px 22px;
    text-align: center;
    margin-top: 12px;
    box-shadow: 0 12px 40px rgba(109, 40, 217, .35);
  }
  .hero::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(320px 160px at 50% -20%, rgba(255,255,255,.22), transparent 70%);
    pointer-events: none;
  }
  .hero .label { font-size: 14px; color: rgba(255,255,255,.85); font-weight: 600; }
  .hero .amount { font-size: 52px; font-weight: 900; letter-spacing: -2px; line-height: 1.15; color: #fff; margin: 2px 0; }
  .hero .amount small { font-size: 20px; font-weight: 600; color: rgba(255,255,255,.8); letter-spacing: 0; }
  .hero .chips { display: flex; justify-content: center; gap: 8px; margin-top: 10px; position: relative; }
  .chip {
    background: rgba(14, 10, 31, .45); backdrop-filter: blur(4px);
    border-radius: 999px; padding: 6px 14px;
    font-size: 13px; font-weight: 600; color: #fff;
  }
  .chip b { color: var(--lime); font-weight: 800; }

  /* ---- sections ---- */
  h2 { font-size: 14px; color: var(--muted); font-weight: 600; margin: 24px 4px 10px; letter-spacing: .3px; }

  .renewal {
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(90deg, rgba(255, 46, 136, .18), rgba(255, 46, 136, .07));
    border: 1px solid rgba(255, 46, 136, .4);
    color: #ffb8d6;
    border-radius: 14px; padding: 11px 14px; margin-bottom: 8px;
    font-size: 14px; font-weight: 600;
  }
  .renewal .emoji { font-size: 18px; }

  .sub-card {
    display: flex; align-items: center; gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform .08s;
  }
  .sub-card:active { transform: scale(.985); }
  .sub-card .emoji {
    font-size: 24px; width: 48px; height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--card-2); border: 1px solid var(--border); border-radius: 14px;
  }
  .sub-card .info { flex: 1; min-width: 0; }
  .sub-card .name { font-weight: 800; font-size: 16px; }
  .sub-card .meta { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .sub-card .price { text-align: left; }
  .sub-card .price .v { font-weight: 900; font-size: 17px; color: var(--lime); }
  .sub-card .price .c { font-size: 12px; color: var(--muted); }

  .empty { text-align: center; padding: 44px 20px; color: var(--muted); }
  .empty .big { font-size: 46px; margin-bottom: 12px; }
  .empty p { font-size: 15px; line-height: 1.7; }

  /* ---- fab ---- */
  .fab {
    position: fixed; bottom: max(24px, env(safe-area-inset-bottom)); inset-inline-start: 50%;
    transform: translateX(50%);
    background: var(--lime); color: var(--lime-dark);
    border: none; border-radius: 999px;
    font-size: 17px; font-weight: 800; font-family: inherit;
    padding: 16px 32px;
    box-shadow: 0 8px 28px rgba(212, 245, 55, .35);
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    z-index: 10;
  }
  .fab:active { transform: translateX(50%) scale(.97); }

  /* ---- dialogs ---- */
  dialog {
    border: 1px solid var(--border); border-bottom: none;
    border-radius: 22px 22px 0 0;
    background: var(--card); color: var(--text);
    width: 100%; max-width: 560px;
    max-height: 85vh;
    padding: 0;
    margin: auto auto 0;
    box-shadow: 0 -10px 50px rgba(0, 0, 0, .5);
  }
  dialog::backdrop { background: rgba(5, 3, 15, .7); }
  .dlg-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px 10px;
    position: sticky; top: 0; background: var(--card); z-index: 2;
  }
  .dlg-head h3 { font-size: 18px; font-weight: 800; }
  .dlg-close {
    background: var(--card-2); border: 1px solid var(--border); border-radius: 999px;
    width: 32px; height: 32px; font-size: 14px; cursor: pointer;
    color: var(--muted); font-family: inherit;
  }
  .dlg-body { padding: 0 18px 26px; overflow-y: auto; }

  .search {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--bg); color: var(--text);
    font-size: 16px; font-family: inherit;
    margin-bottom: 6px;
  }
  .search:focus { outline: 2px solid var(--lime); border-color: transparent; }
  .search::placeholder { color: var(--muted); }

  .cat-title { font-size: 13px; font-weight: 600; color: var(--muted); margin: 16px 2px 8px; }
  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cat-item {
    background: var(--card-2); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 6px; text-align: center; cursor: pointer;
    font-family: inherit; color: var(--text);
  }
  .cat-item:active { border-color: var(--lime); }
  .cat-item .e { font-size: 26px; display: block; margin-bottom: 4px; }
  .cat-item .n { font-size: 13px; font-weight: 600; display: block; }
  .cat-item .p { font-size: 11px; color: var(--muted); display: block; margin-top: 2px; }
  .custom-btn {
    width: 100%; margin-top: 18px;
    background: none; border: 2px dashed var(--border); border-radius: 14px;
    padding: 14px; font-size: 15px; font-weight: 600; color: var(--muted);
    cursor: pointer; font-family: inherit;
  }

  /* ---- form ---- */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--bg); color: var(--text);
    font-size: 16px; font-family: inherit;
  }
  .field input:focus, .field select:focus { outline: 2px solid var(--lime); border-color: transparent; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .seg {
    display: grid; grid-template-columns: 1fr 1fr;
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
  }
  .seg button {
    padding: 11px; border: none; background: var(--bg); color: var(--muted);
    font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .seg button.on { background: var(--lime); color: var(--lime-dark); font-weight: 800; }
  .btn-primary {
    width: 100%; padding: 15px;
    background: var(--lime); color: var(--lime-dark);
    border: none; border-radius: 14px;
    font-size: 17px; font-weight: 800; font-family: inherit;
    cursor: pointer; margin-top: 6px;
  }
  .btn-danger {
    width: 100%; padding: 13px;
    background: none; color: var(--pink);
    border: none; font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; margin-top: 8px;
  }

  /* ---- toast ---- */
  .toast {
    position: fixed; bottom: 96px; inset-inline-start: 50%;
    transform: translateX(50%);
    background: var(--lime); color: var(--lime-dark);
    padding: 10px 22px; border-radius: 999px;
    font-size: 14px; font-weight: 800;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
    z-index: 50;
    box-shadow: 0 6px 20px rgba(212, 245, 55, .3);
  }
  .toast.show { opacity: 1; }

  footer { text-align: center; margin-top: 32px; font-size: 12px; color: var(--muted); line-height: 1.8; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="coin">₪</span> מנוימטר</div>
    <div class="actions">
      <button class="icon-btn" id="btnInstall" title="התקנה על מסך הבית">⬇️</button>
      <button class="icon-btn" id="btnBell" title="תזכורות לפני חידוש">🔔</button>
    </div>
  </div>

  <div class="hero">
    <div class="label">המנויים שלך עולים לך</div>
    <div class="amount"><span id="totalMonthly">₪0</span> <small>בחודש</small></div>
    <div class="chips">
      <span class="chip"><b id="totalYearly">₪0</b> בשנה</span>
      <span class="chip" id="subCount">0 מנויים</span>
    </div>
  </div>

  <div id="renewals"></div>

  <h2 id="listTitle" hidden>המנויים שלי</h2>
  <div id="list"></div>

  <div class="empty" id="empty">
    <div class="big">🕵️</div>
    <p>עוד לא הוספת מנויים.<br>לחץ על הכפתור למטה וגלה כמה אתה באמת משלם כל חודש.</p>
  </div>

  <footer>
    הנתונים נשמרים רק אצלך במכשיר — לא נשלחים לשום שרת.<br>
    המחירים בקטלוג משוערים וניתנים לעריכה.
  </footer>
</div>

<button class="fab" id="fabAdd">➕ הוסף מנוי</button>

<!-- catalog picker -->
<dialog id="dlgCatalog">
  <div class="dlg-head">
    <h3>איזה מנוי להוסיף?</h3>
    <button class="dlg-close" data-close="dlgCatalog">✕</button>
  </div>
  <div class="dlg-body">
    <input class="search" id="catSearch" type="search" placeholder="חיפוש… (נטפליקס, ספוטיפיי, חדר כושר)">
    <div id="catList"></div>
    <button class="custom-btn" id="btnCustom">➕ מנוי אחר שלא ברשימה</button>
  </div>
</dialog>

<!-- add / edit form -->
<dialog id="dlgForm">
  <div class="dlg-head">
    <h3 id="formTitle">הוספת מנוי</h3>
    <button class="dlg-close" data-close="dlgForm">✕</button>
  </div>
  <div class="dlg-body">
    <div class="field">
      <label for="fName">שם המנוי</label>
      <input id="fName" type="text" maxlength="40" placeholder="למשל: נטפליקס">
    </div>
    <div class="row2">
      <div class="field">
        <label for="fPrice">מחיר (₪)</label>
        <input id="fPrice" type="number" inputmode="decimal" min="0" step="0.1" placeholder="0.00">
      </div>
      <div class="field">
        <label>תדירות חיוב</label>
        <div class="seg">
          <button type="button" id="segMonthly" class="on">חודשי</button>
          <button type="button" id="segYearly">שנתי</button>
        </div>
      </div>
    </div>
    <div class="field" id="fieldDay">
      <label for="fDay">יום החיוב בחודש</label>
      <select id="fDay"></select>
    </div>
    <div class="field" id="fieldDate" hidden>
      <label for="fDate">תאריך החידוש הבא</label>
      <input id="fDate" type="date">
    </div>
    <button class="btn-primary" id="btnSave">שמירה</button>
    <button class="btn-danger" id="btnDelete" hidden>🗑️ מחיקת המנוי</button>
  </div>
</dialog>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* ---------- catalog: common Israeli subscriptions (estimated prices, ₪/month) ---------- */
const CATALOG = [
  { cat: "סטרימינג וטלוויזיה", items: [
    { name: "נטפליקס", emoji: "🎬", price: 54.90 },
    { name: "דיסני+", emoji: "🏰", price: 34.90 },
    { name: "יוטיוב פרימיום", emoji: "▶️", price: 24.90 },
    { name: "Apple TV+", emoji: "🍎", price: 34.90 },
    { name: "אמזון פריים", emoji: "📦", price: 14.90 },
    { name: "HOT", emoji: "📺", price: 199 },
    { name: "yes", emoji: "📡", price: 149 },
    { name: "סלקום TV", emoji: "📺", price: 89 },
    { name: "פרטנר TV", emoji: "📺", price: 89 },
    { name: "STING TV", emoji: "📺", price: 69 },
  ]},
  { cat: "מוזיקה", items: [
    { name: "ספוטיפיי", emoji: "🎵", price: 23.90 },
    { name: "Apple Music", emoji: "🎧", price: 19.90 },
    { name: "YouTube Music", emoji: "🎶", price: 19.90 },
  ]},
  { cat: "ענן ובינה מלאכותית", items: [
    { name: "iCloud+", emoji: "☁️", price: 11.90 },
    { name: "Google One", emoji: "☁️", price: 9.90 },
    { name: "ChatGPT Plus", emoji: "🤖", price: 75 },
    { name: "Claude Pro", emoji: "🤖", price: 65 },
    { name: "Dropbox", emoji: "📁", price: 42 },
  ]},
  { cat: "גיימינג", items: [
    { name: "PlayStation Plus", emoji: "🎮", price: 33.90 },
    { name: "Xbox Game Pass", emoji: "🎮", price: 39.90 },
    { name: "Nintendo Online", emoji: "🕹️", price: 12 },
  ]},
  { cat: "ספורט ובריאות", items: [
    { name: "חדר כושר", emoji: "🏋️", price: 199 },
    { name: "הולמס פלייס", emoji: "🏊", price: 249 },
    { name: "ביטוח בריאות משלים", emoji: "🩺", price: 45 },
  ]},
  { cat: "תקשורת", items: [
    { name: "סלולר", emoji: "📱", price: 29.90 },
    { name: "אינטרנט ביתי", emoji: "🌐", price: 99 },
  ]},
  { cat: "חדשות ותוכן", items: [
    { name: "ynet+", emoji: "📰", price: 19.90 },
    { name: "הארץ", emoji: "📰", price: 39.90 },
    { name: "גלובס", emoji: "📰", price: 34.90 },
  ]},
  { cat: "שונות", items: [
    { name: "Wolt+", emoji: "🛵", price: 19.90 },
    { name: "פנגו / חניה", emoji: "🅿️", price: 20 },
    { name: "מנוי עיתון / מגזין", emoji: "📖", price: 30 },
  ]},
];

/* ---------- state ---------- */
const STORE_KEY = "minuymeter.subs.v1";
let subs = load();
let editId = null;
let formCycle = "monthly";

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(subs));
  idbSet("subs", subs).catch(() => {});
}

/* ---------- IndexedDB mirror (לשימוש ה-service worker בהתראות) ---------- */
function idb() {
  return new Promise((res, rej) => {
    const req = indexedDB.open("minuymeter", 1);
    req.onupgradeneeded = () => req.result.createObjectStore("kv");
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
function idbSet(key, val) {
  return idb().then(db => new Promise((res, rej) => {
    const tx = db.transaction("kv", "readwrite");
    tx.objectStore("kv").put(JSON.parse(JSON.stringify(val)), key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  }));
}

/* ---------- date helpers ---------- */
function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function startOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

function nextCharge(sub) {
  const today = startOfDay(new Date());
  const anchor = new Date(sub.anchor + "T00:00:00");
  if (sub.cycle === "monthly") {
    const day = anchor.getDate();
    let y = today.getFullYear(), m = today.getMonth();
    let cand = new Date(y, m, Math.min(day, daysInMonth(y, m)));
    if (cand < today) {
      m += 1; if (m > 11) { m = 0; y += 1; }
      cand = new Date(y, m, Math.min(day, daysInMonth(y, m)));
    }
    return cand;
  }
  let y = today.getFullYear();
  let cand = new Date(y, anchor.getMonth(), Math.min(anchor.getDate(), daysInMonth(y, anchor.getMonth())));
  if (cand < today) {
    y += 1;
    cand = new Date(y, anchor.getMonth(), Math.min(anchor.getDate(), daysInMonth(y, anchor.getMonth())));
  }
  return cand;
}

function daysUntil(date) {
  const today = startOfDay(new Date());
  return Math.round((date - today) / 86400000);
}

/* ---------- formatting ---------- */
const ils = new Intl.NumberFormat("he-IL", { style: "currency", currency: "ILS", maximumFractionDigits: 0 });
const ilsExact = new Intl.NumberFormat("he-IL", { style: "currency", currency: "ILS", minimumFractionDigits: 2 });
const dateFmt = new Intl.DateTimeFormat("he-IL", { day: "numeric", month: "long" });

function monthlyOf(sub) { return sub.cycle === "yearly" ? sub.price / 12 : sub.price; }

/* ---------- rendering ---------- */
const $ = id => document.getElementById(id);

function render() {
  const totalM = subs.reduce((s, x) => s + monthlyOf(x), 0);
  $("totalMonthly").textContent = ils.format(totalM);
  $("totalYearly").textContent = ils.format(totalM * 12);
  $("subCount").textContent = subs.length === 1 ? "מנוי אחד" : subs.length + " מנויים";

  const soon = subs
    .map(s => ({ s, d: nextCharge(s) }))
    .filter(x => daysUntil(x.d) <= 7)
    .sort((a, b) => a.d - b.d);
  $("renewals").innerHTML = soon.map(({ s, d }) => {
    const n = daysUntil(d);
    const when = n === 0 ? "היום" : n === 1 ? "מחר" : "בעוד " + n + " ימים";
    return `<div class="renewal"><span class="emoji">⏰</span><span>${esc(s.emoji)} ${esc(s.name)} מתחדש ${when} — ${ilsExact.format(s.price)}</span></div>`;
  }).join("");

  const sorted = [...subs].sort((a, b) => nextCharge(a) - nextCharge(b));
  $("list").innerHTML = sorted.map(s => {
    const d = nextCharge(s);
    const cyc = s.cycle === "yearly" ? "לשנה" : "לחודש";
    return `<div class="sub-card" data-id="${s.id}">
      <div class="emoji">${esc(s.emoji)}</div>
      <div class="info">
        <div class="name">${esc(s.name)}</div>
        <div class="meta">חיוב הבא: ${dateFmt.format(d)}</div>
      </div>
      <div class="price"><div class="v">${ilsExact.format(s.price)}</div><div class="c">${cyc}</div></div>
    </div>`;
  }).join("");

  $("listTitle").hidden = subs.length === 0;
  $("empty").style.display = subs.length === 0 ? "" : "none";
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* ---------- catalog dialog ---------- */
function renderCatalog(filter) {
  const q = (filter || "").trim();
  $("catList").innerHTML = CATALOG.map(group => {
    const items = group.items.filter(i => !q || i.name.includes(q));
    if (!items.length) return "";
    return `<div class="cat-title">${esc(group.cat)}</div>
      <div class="cat-grid">${items.map(i =>
        `<button class="cat-item" data-name="${esc(i.name)}" data-emoji="${esc(i.emoji)}" data-price="${i.price}">
          <span class="e">${esc(i.emoji)}</span><span class="n">${esc(i.name)}</span><span class="p">~${ils.format(i.price)}</span>
        </button>`).join("")}</div>`;
  }).join("") || `<p style="color:var(--muted);text-align:center;padding:20px 0">לא נמצא… נסה "מנוי אחר" למטה</p>`;
}

/* ---------- form dialog ---------- */
function openForm(preset) {
  editId = preset.id || null;
  $("formTitle").textContent = editId ? "עריכת מנוי" : "הוספת מנוי";
  $("fName").value = preset.name || "";
  $("fPrice").value = preset.price != null ? preset.price : "";
  setCycle(preset.cycle || "monthly");

  const anchor = preset.anchor ? new Date(preset.anchor + "T00:00:00") : new Date();
  $("fDay").value = String(anchor.getDate());
  $("fDate").value = toISO(preset.cycle === "yearly" ? nextCharge(preset) : anchor);

  $("btnDelete").hidden = !editId;
  $("dlgForm")._emoji = preset.emoji || "💳";
  $("dlgForm").showModal();
  if (!editId && !preset.name) $("fName").focus();
}

function setCycle(c) {
  formCycle = c;
  $("segMonthly").classList.toggle("on", c === "monthly");
  $("segYearly").classList.toggle("on", c === "yearly");
  $("fieldDay").hidden = c !== "monthly";
  $("fieldDate").hidden = c !== "yearly";
}

function toISO(d) {
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function saveForm() {
  const name = $("fName").value.trim();
  const price = parseFloat($("fPrice").value);
  if (!name) { toast("צריך לתת שם למנוי"); $("fName").focus(); return; }
  if (!(price > 0)) { toast("צריך להזין מחיר"); $("fPrice").focus(); return; }

  let anchorISO;
  if (formCycle === "monthly") {
    const day = parseInt($("fDay").value, 10) || 1;
    const now = new Date();
    anchorISO = toISO(new Date(now.getFullYear(), now.getMonth(), Math.min(day, daysInMonth(now.getFullYear(), now.getMonth()))));
    if (day > new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate()) {
      anchorISO = toISO(new Date(now.getFullYear(), 0, day)); // בינואר תמיד 31 יום
    }
  } else {
    anchorISO = $("fDate").value || toISO(new Date());
  }

  const wasEdit = !!editId;
  if (editId) {
    const s = subs.find(x => x.id === editId);
    if (s) Object.assign(s, { name, price, cycle: formCycle, anchor: anchorISO });
  } else {
    subs.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      name, price, cycle: formCycle, anchor: anchorISO,
      emoji: $("dlgForm")._emoji || "💳",
    });
  }
  save(); render();
  $("dlgForm").close();
  toast(wasEdit ? "נשמר ✓" : "המנוי נוסף ✓");
  editId = null;
}

/* ---------- toast ---------- */
let toastTimer;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

/* ---------- PWA: service worker + install ---------- */
let swReg = null;
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").then(r => { swReg = r; checkRenewalsNow(); }).catch(() => {});
}

let installPrompt = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  installPrompt = e;
  $("btnInstall").style.display = "flex";
});
$("btnInstall").addEventListener("click", async () => {
  if (!installPrompt) return;
  installPrompt.prompt();
  const { outcome } = await installPrompt.userChoice;
  if (outcome === "accepted") { $("btnInstall").style.display = "none"; toast("מנוימטר הותקן 🎉"); }
  installPrompt = null;
});

/* ---------- notifications ---------- */
function bellState() {
  $("btnBell").classList.toggle("on", "Notification" in window && Notification.permission === "granted");
}
$("btnBell").addEventListener("click", async () => {
  if (!("Notification" in window)) { toast("הדפדפן לא תומך בהתראות"); return; }
  if (Notification.permission === "granted") { toast("תזכורות פעילות ✓ תקבל התראה לפני כל חידוש"); return; }
  if (Notification.permission === "denied") { toast("ההתראות חסומות — אפשר לאפשר בהגדרות הדפדפן"); return; }
  const perm = await Notification.requestPermission();
  bellState();
  if (perm === "granted") {
    toast("מעולה! תקבל תזכורת לפני כל חידוש 🔔");
    checkRenewalsNow();
    // סנכרון תקופתי ברקע — נתמך באנדרואיד כשמותקן כאפליקציה
    try {
      const status = await navigator.permissions.query({ name: "periodic-background-sync" });
      if (status.state === "granted" && swReg && "periodicSync" in swReg) {
        await swReg.periodicSync.register("check-renewals", { minInterval: 12 * 60 * 60 * 1000 });
      }
    } catch {}
  }
});

function checkRenewalsNow() {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  idbSet("subs", subs).catch(() => {});
  if (navigator.serviceWorker.controller) navigator.serviceWorker.controller.postMessage("check-renewals");
}
document.addEventListener("visibilitychange", () => { if (!document.hidden) checkRenewalsNow(); });

/* ---------- wiring ---------- */
$("fDay").innerHTML = Array.from({ length: 31 }, (_, i) => `<option value="${i + 1}">${i + 1} בחודש</option>`).join("");

$("fabAdd").addEventListener("click", () => {
  $("catSearch").value = "";
  renderCatalog("");
  $("dlgCatalog").showModal();
});

$("catSearch").addEventListener("input", e => renderCatalog(e.target.value));

$("catList").addEventListener("click", e => {
  const btn = e.target.closest(".cat-item");
  if (!btn) return;
  $("dlgCatalog").close();
  openForm({ name: btn.dataset.name, emoji: btn.dataset.emoji, price: parseFloat(btn.dataset.price) });
});

$("btnCustom").addEventListener("click", () => {
  $("dlgCatalog").close();
  openForm({});
});

$("list").addEventListener("click", e => {
  const card = e.target.closest(".sub-card");
  if (!card) return;
  const s = subs.find(x => x.id === card.dataset.id);
  if (s) openForm(s);
});

$("segMonthly").addEventListener("click", () => setCycle("monthly"));
$("segYearly").addEventListener("click", () => setCycle("yearly"));
$("btnSave").addEventListener("click", saveForm);

$("btnDelete").addEventListener("click", () => {
  if (!editId) return;
  const s = subs.find(x => x.id === editId);
  if (s && !confirm(`למחוק את "${s.name}"?`)) return;
  subs = subs.filter(x => x.id !== editId);
  editId = null;
  save(); render();
  $("dlgForm").close();
  toast("המנוי נמחק");
});

document.querySelectorAll("[data-close]").forEach(b =>
  b.addEventListener("click", () => $(b.dataset.close).close()));

bellState();
idbSet("subs", subs).catch(() => {});
render();
</script>
</body>
</html>
