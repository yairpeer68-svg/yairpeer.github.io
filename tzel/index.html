<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="description" content="גלה מה האינטרנט יודע עליך: דליפות סיסמאות, מספרך במאגרים, החשבונות שלך — וקבל מדריך מדויק איך למחוק ולהתגונן.">
<meta property="og:title" content="צל דיגיטלי — כמה אתה חשוף ברשת? 🕵️">
<meta property="og:description" content="בדיקת חשיפה דיגיטלית בעברית: דליפות, מאגרים, וטביעת הרגל שלך — עם מדריך הגנה.">
<meta name="theme-color" content="#071324">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #071324;
    --glow-1: rgba(39, 224, 192, .12);
    --glow-2: rgba(16, 35, 63, .8);
    --card: #0e2038;
    --card-2: #152b49;
    --text: #e8f3f6;
    --muted: #8098ad;
    --cyan: #27e0c0;
    --cyan-dark: #05201c;
    --red: #ff5c7a;
    --orange: #ffa64d;
    --yellow: #ffd54d;
    --green: #4ade80;
    --border: #1d3a5c;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Rubik", -apple-system, "Segoe UI", Arial, sans-serif;
    background:
      radial-gradient(600px 400px at 85% -5%, var(--glow-1), transparent 70%),
      radial-gradient(700px 500px at -10% 40%, var(--glow-2), transparent 70%),
      var(--bg);
    color: var(--text);
    min-height: 100vh; min-height: 100dvh;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 14px 16px 60px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 2px 4px; }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 18px; }
  .brand .b { font-size: 20px; }
  .mono { font-variant-numeric: tabular-nums; }

  /* ---- intro / scan form ---- */
  .hero { text-align: center; padding: 22px 6px 6px; }
  .hero .eye { font-size: 46px; }
  .hero h1 { font-size: 27px; font-weight: 900; letter-spacing: -.5px; margin-top: 10px; line-height: 1.3; }
  .hero h1 em { font-style: normal; color: var(--cyan); }
  .hero p { font-size: 14.5px; color: var(--muted); line-height: 1.7; margin-top: 10px; }

  .form { margin-top: 22px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 13px 14px;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--card); color: var(--text);
    font-size: 16px; font-family: inherit; direction: ltr; text-align: start;
  }
  .field input:focus { outline: 2px solid var(--cyan); border-color: transparent; }
  .field input::placeholder { color: #56708a; }
  .scan-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; margin-top: 8px;
    background: var(--cyan); color: var(--cyan-dark);
    border: none; border-radius: 14px;
    font-size: 17px; font-weight: 900; font-family: inherit;
    padding: 16px; cursor: pointer;
    box-shadow: 0 8px 26px rgba(39, 224, 192, .28);
  }
  .scan-btn:active { transform: scale(.985); }
  .privacy-line { font-size: 12px; color: var(--muted); text-align: center; margin-top: 12px; line-height: 1.6; }

  /* ---- scanning animation ---- */
  .scanning { text-align: center; padding: 40px 20px; }
  .radar {
    width: 120px; height: 120px; margin: 0 auto 16px; border-radius: 50%;
    border: 2px solid rgba(39,224,192,.25); position: relative; overflow: hidden;
  }
  .radar::before {
    content: ""; position: absolute; inset: 0;
    background: conic-gradient(from 0deg, transparent 0deg, rgba(39,224,192,.5) 40deg, transparent 60deg);
    animation: sweep 1.1s linear infinite;
  }
  @keyframes sweep { to { transform: rotate(360deg); } }
  .scan-log { font-size: 13.5px; color: var(--muted); font-family: ui-monospace, monospace; min-height: 22px; direction: ltr; }

  /* ---- results ---- */
  .score-card {
    background: linear-gradient(160deg, var(--card), var(--bg));
    border: 1px solid var(--border); border-radius: 22px;
    padding: 22px 18px; text-align: center; margin-bottom: 14px;
  }
  .ring { width: 150px; height: 150px; margin: 0 auto; position: relative; }
  .ring svg { transform: rotate(-90deg); }
  .ring .num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring .num b { font-size: 42px; font-weight: 900; line-height: 1; }
  .ring .num span { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .score-card .verdict { font-size: 18px; font-weight: 800; margin-top: 12px; }
  .score-card .sub { font-size: 13.5px; color: var(--muted); margin-top: 4px; }

  .sevbar { display: flex; gap: 6px; margin-bottom: 16px; }
  .sev-pill { flex: 1; text-align: center; border-radius: 12px; padding: 10px 4px; border: 1px solid var(--border); background: var(--card); }
  .sev-pill b { display: block; font-size: 20px; font-weight: 900; }
  .sev-pill span { font-size: 11px; color: var(--muted); }
  .sev-pill.red b { color: var(--red); }
  .sev-pill.orange b { color: var(--orange); }
  .sev-pill.green b { color: var(--green); }

  h2 { font-size: 14px; color: var(--muted); font-weight: 600; margin: 22px 4px 10px; }

  .finding {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 10px; overflow: hidden;
  }
  .finding .row {
    display: flex; align-items: center; gap: 12px; padding: 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .finding .sev-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .sev-critical { background: var(--red); }
  .sev-warn { background: var(--orange); }
  .sev-info { background: var(--yellow); }
  .sev-ok { background: var(--green); }
  .finding .info { flex: 1; min-width: 0; }
  .finding .title { font-weight: 800; font-size: 15.5px; }
  .finding .meta { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .finding .chev { color: var(--muted); font-size: 13px; transition: transform .2s; }
  .finding.open .chev { transform: rotate(90deg); }
  .finding .detail { max-height: 0; overflow: hidden; transition: max-height .3s; }
  .finding.open .detail { max-height: 800px; }
  .finding .detail-in { padding: 0 14px 14px; border-top: 1px solid var(--border); }
  .finding .detail-in p { font-size: 14px; line-height: 1.7; color: #c4d6e0; margin: 10px 0; }
  .fix-title { font-size: 12.5px; font-weight: 800; color: var(--cyan); margin: 10px 0 6px; }
  .fix-step { display: flex; gap: 9px; font-size: 14px; line-height: 1.6; padding: 4px 0; }
  .fix-step .n { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: var(--card-2); border: 1px solid var(--border); color: var(--cyan); font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
  .fix-link { display: inline-block; margin-top: 8px; color: var(--cyan); font-size: 13.5px; font-weight: 600; text-decoration: none; }

  .locked {
    filter: blur(6px); pointer-events: none; user-select: none;
  }
  .paywall {
    background: linear-gradient(160deg, rgba(39,224,192,.12), rgba(39,224,192,.03));
    border: 1px solid rgba(39,224,192,.4); border-radius: var(--radius);

  .paywall .lock { font-size: 30px; }
  .paywall h3 { font-size: 17px; font-weight: 900; margin: 6px 0 4px; }
  .paywall p { font-size: 13.5px; color: var(--muted); line-height: 1.6; }
  .paywall .cta {
    width: 100%; margin-top: 12px; padding: 14px;
    background: var(--cyan); color: var(--cyan-dark); border: none; border-radius: 12px;
    font-size: 15px; font-weight: 800; font-family: inherit; cursor: pointer;
  }
  .paywall .code { margin-top: 8px; }
  .paywall .code input { width: 100%; padding: 10px; text-align: center; border: 1px solid var(--border); border-radius: 10px; background: var(--card); color: var(--text); font-family: inherit; }
  .paywall .code button { margin-top: 6px; background: none; border: none; color: var(--muted); font-family: inherit; font-size: 13px; cursor: pointer; text-decoration: underline; }

  .monitor-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin-top: 12px; text-align: center;
  }
  .monitor-card h3 { font-size: 16px; font-weight: 800; }
  .monitor-card p { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.6; }
  .monitor-card button {
    margin-top: 10px; padding: 11px 20px; border-radius: 999px;
    background: var(--card-2); color: var(--text); border: 1px solid var(--border);
    font-family: inherit; font-weight: 700; font-size: 14px; cursor: pointer;
  }
  .monitor-card button.on { border-color: var(--cyan); color: var(--cyan); }

  .rescan { display: block; margin: 18px auto 0; background: none; border: none; color: var(--muted); font-family: inherit; font-size: 14px; cursor: pointer; text-decoration: underline; }

  .demo-note {
    background: rgba(39,224,192,.08); border: 1px solid rgba(39,224,192,.3);
    color: #9df0e2; border-radius: 12px; padding: 11px 14px;
    font-size: 13px; line-height: 1.6; margin-bottom: 12px;
  }

  .toast {
    position: fixed; bottom: 30px; inset-inline-start: 50%; transform: translateX(50%);
    background: var(--cyan); color: var(--cyan-dark); padding: 10px 20px; border-radius: 999px;
    font-size: 14px; font-weight: 800; opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 50;
  }
  .toast.show { opacity: 1; }

  footer { text-align: center; margin-top: 34px; font-size: 12px; color: var(--muted); line-height: 1.9; opacity: .85; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="b">🕵️</span> צל דיגיטלי</div>
    <span class="mono" id="modeTag" style="font-size:11px;color:var(--muted)"></span>
  </div>

  <!-- intro + form -->
  <div id="viewHome">
    <div class="hero">
      <div class="eye">👁️</div>
      <h1>מה האינטרנט<br><em>יודע עליך?</em></h1>
      <p>בשנייה אחת תגלה איפה הפרטים שלך דלפו, באילו מאגרים אתה מופיע, ואיך למחוק ולהתגונן — לפני שמישהו אחר ימצא את זה קודם.</p>
    </div>
    <div class="form">
      <div class="field">
        <label for="fEmail">כתובת אימייל</label>
        <input id="fEmail" type="email" inputmode="email" placeholder="you@example.com" autocomplete="off">
      </div>
      <div class="field">
        <label for="fPhone">טלפון (לא חובה)</label>
        <input id="fPhone" type="tel" inputmode="tel" placeholder="050-1234567" autocomplete="off">

    </div>
  </div>

  <!-- scanning -->
  <div id="viewScan" hidden>

      <div class="radar"></div>
      <div class="scan-log mono" id="scanLog">initializing…</div>
    </div>
  </div>

  <!-- results -->
  <div id="viewResults" hidden>
    <div id="resultsBody"></div>
    <button class="rescan" id="btnRescan">↻ סריקה חדשה</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* =========================================================
   הגדרות שרת — כשמחברים backend (Supabase + HIBP וכו'),
   ממלאים כאן וכל האפליקציה עוברת ממצב הדגמה לבדיקה אמיתית.
   הוראות: tzel-backend/README.md
   ========================================================= */
const CONFIG = {
  SUPABASE_URL: "https://twggrbbkoxjyycydrvpi.supabase.co",
  SUPABASE_ANON_KEY: "sb_publishable_QPyn4aNqaO2H6kWEedY0SA_przNJs3G",
};
const SERVER_MODE = !!(CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY);

/* פרימיום */
const UNLOCK_CODES = ["YAIR-VIP", "TZEL2026"];
let isPremium = localStorage.getItem("tzel.premium") === "1";

/* ---------- מאגר ממצאים לדוגמה (מדגים איך ייראה דוח אמיתי) ---------- */
function demoFindings(email) {
  const dom = (email.split("@")[1] || "example.com");
  return {
    score: 42,
    findings: [
      { sev: "critical", icon: "🔓", title: "הסיסמה שלך דלפה ב-3 פריצות", meta: "כולל פריצה גדולה מ-2024",
        body: "כתובת המייל שלך הופיעה ב-3 דליפות מידע ידועות. משמעות: הסיסמאות שהשתמשת בהן באתרים האלה חשופות, ותוקפים מנסים אותן אוטומטית באתרים אחרים (התקפה שנקראת credential stuffing).",
        fixes: ["החלף עכשיו את הסיסמה בכל אתר שבו השתמשת באותה סיסמה.", "עבור למנהל סיסמאות (Bitwarden חינמי, או המובנה בטלפון) — סיסמה ייחודית לכל אתר.", "הפעל אימות דו-שלבי (2FA) בחשבונות הקריטיים: מייל, בנק, רשתות."],
        link: { label: "בדוק בעצמך ב-Have I Been Pwned", url: "https://haveibeenpwned.com/" } },
      { sev: "critical", icon: "📱", title: "מספר הטלפון שלך במאגר שיווקי", meta: "נמכר לחברות דיוור",
        body: "המספר שלך נמצא במאגר שנסחר בין חברות שיווק וספאם. זה מקור לשיחות מכירה, SMS פישינג והודעות וואטסאפ מזויפות.",
        fixes: ["הירשם למאגר 'אל תתקשרו אליי' של הרשות להגנת הצרכן.", "חסום ודווח על מספרים חשודים ישירות באפליקציית הטלפון.", "אל תלחץ על קישורים ב-SMS — גם אם נראה שזה מהבנק."] },
      { sev: "warn", icon: "🔑", title: "אין אימות דו-שלבי במייל הראשי", meta: "לפי סוג הספק",
        body: "חשבון המייל הוא 'מפתח האב' — מי שנכנס אליו יכול לאפס סיסמאות בכל שאר האתרים. בלי 2FA, סיסמה שדלפה = השתלטות מלאה.",
        fixes: ["הפעל 2FA בהגדרות האבטחה של המייל — עדיף עם אפליקציית Authenticator ולא SMS.", "הגדר כתובת/טלפון לשחזור מעודכנים.", "בדוק ב'פעילות אחרונה' אם יש התחברויות שאתה לא מזהה."] },
      { sev: "warn", icon: "🌐", title: "הפרופילים הציבוריים שלך חושפים מידע", meta: "רשתות חברתיות",
        body: "פרטים כמו מקום עבודה, עיר מגורים ותאריך לידה גלויים בפרופילים ציבוריים — בדיוק החומר שמשמש לפישינג ממוקד (spear phishing) והתחזות.",
        fixes: ["עבור על הגדרות הפרטיות בפייסבוק/אינסטגרם — הפוך ל'חברים בלבד'.", "הסר תאריך לידה מלא ומספר טלפון מהפרופילים.", "חפש את השם שלך בגוגל וראה מה גלוי — זו נקודת המבט של התוקף."] },
      { sev: "info", icon: "📧", title: `כתובת ה-${email ? "מייל" : "מייל"} מופיעה ב-${(dom.length % 4) + 5} אתרים`, meta: "טביעת רגל דיגיטלית",
        body: "המייל שלך רשום במספר שירותים. ככל שהוא מפוזר ביותר מקומות, כך יש יותר 'דלתות' שדרכן אפשר לתקוף אותך.",
        fixes: ["השתמש בכתובת מייל נפרדת ('alias') להרשמות לא חשובות.", "בטל חשבונות ישנים שאתה לא משתמש בהם יותר.", "בג'ימייל: השתמש בכתובת+תווית (name+shop@gmail.com) כדי לזהות מי הדליף אותך."] },
      { sev: "ok", icon: "✅", title: "לא נמצאה חשיפת כתובת מגורים", meta: "בדיקה בסיסית",
        body: "בבדיקה הנוכחית לא נמצאה כתובת המגורים שלך במאגרים הפומביים שנבדקו. זה טוב — המשך לשמור על זה.",
        fixes: ["המשך לא לפרסם את הכתובת המדויקת ברשתות.", "בהזמנות אונליין העדף נקודות איסוף על פני כתובת הבית."] },
    ],
  };
}

/* ---------- state ---------- */
const $ = id => document.getElementById(id);
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
let lastReport = null;

function show(v) {
  $("viewHome").hidden = v !== "home";
  $("viewScan").hidden = v !== "scan";
  $("viewResults").hidden = v !== "results";
  window.scrollTo(0, 0);
}

const SEV_LABEL = { critical: "קריטי", warn: "לתיקון", info: "מידע", ok: "תקין" };
const SEV_CLASS = { critical: "sev-critical", warn: "sev-warn", info: "sev-info", ok: "sev-ok" };

/* ---------- server integration (מופעל כשה-CONFIG מלא) ---------- */
let supabase = null;
async function ensureClient() {
  if (supabase) return supabase;
  const mod = await import("https://esm.sh/@supabase/supabase-js@2");
  supabase = mod.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  return supabase;
}
async function serverScan(email, phone) {
  const sb = await ensureClient();
  let { data: { session } } = await sb.auth.getSession();
  if (!session) {
    const { error } = await sb.auth.signInAnonymously();
    if (error) throw error;
  }
  const { data, error } = await sb.functions.invoke("scan", { body: { email, phone } });
  if (error) throw error;
  if (!data || !data.report || !Array.isArray(data.report.findings)) throw new Error("bad response");
  return data.report;
}

function runScan() {
  const email = $("fEmail").value.trim();
  const phone = $("fPhone").value.trim();
  if (!email || !email.includes("@")) { toast("הזן כתובת מייל תקינה"); $("fEmail").focus(); return; }
  show("scan");

  // ניסיון שרת במקביל לאנימציה; נפילה חיננית להדגמה אם השרת עוד לא הושלם
  let serverPromise = null;
  if (SERVER_MODE) {
    serverPromise = Promise.race([
      serverScan(email, phone),
      new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 4000)),
    ]).catch(err => { console.warn("[tzel] server scan unavailable, using demo:", err && err.message); return null; });
  }

  const steps = [
    "> scanning breach databases…",
    "> checking " + email + " …",
    "> querying public records…",
    "> analyzing social footprint…",
    "> checking phone reputation…",
    "> compiling exposure report…",
  ];
  let i = 0;
  const log = $("scanLog");
  const iv = setInterval(async () => {
    log.textContent = steps[i] || "";
    if (++i >= steps.length) {
      clearInterval(iv);
      let report = serverPromise ? await serverPromise : null;
      if (report) {
        $("modeTag").textContent = "מחובר ●";
        lastReport = report;
      } else {
        if (SERVER_MODE) toast("מצב הדגמה — השרת עדיין בהגדרה");
        lastReport = demoFindings(email);
      }
      renderResults(lastReport);
    }
  }, 420);
}

function renderResults(report) {
  const counts = { critical: 0, warn: 0, ok: 0 };
  report.findings.forEach(f => {
    if (f.sev === "critical") counts.critical++;
    else if (f.sev === "warn" || f.sev === "info") counts.warn++;
    else counts.ok++;
  });
  const score = report.score;
  const scoreColor = score < 40 ? "var(--red)" : score < 70 ? "var(--orange)" : "var(--green)";
  const verdict = score < 40 ? "חשיפה גבוהה" : score < 70 ? "חשיפה בינונית" : "חשיפה נמוכה";
  const circ = 2 * Math.PI * 65;
  const off = circ * (1 - score / 100);

  // חינם: הממצא הקריטי הראשון גלוי; השאר נעולים עד פרימיום
  let criticalShown = 0;
  const cardsHtml = report.findings.map((f, idx) => {
    const locked = !isPremium && f.sev !== "ok" && !(f.sev === "critical" && criticalShown === 0 && ++criticalShown);
    return findingCard(f, idx, locked);
  }).join("");

  $("resultsBody").innerHTML = `
    ${!SERVER_MODE ? `<div class="demo-note">🧪 <b>הדגמה</b> על דוח לדוגמה. כשהשרת יחובר, כל בדיקה תרוץ מול מאגרי דליפות אמיתיים.</div>` : ""}
    <div class="score-card">
      <div class="ring">
        <svg width="150" height="150" viewBox="0 0 150 150">
          <circle cx="75" cy="75" r="65" fill="none" stroke="var(--card-2)" stroke-width="12"/>
          <circle cx="75" cy="75" r="65" fill="none" stroke="${scoreColor}" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
        </svg>
        <div class="num"><b style="color:${scoreColor}">${score}</b><span>ציון הגנה</span></div>
      </div>
      <div class="verdict" style="color:${scoreColor}">${verdict}</div>
      <div class="sub">מתוך 100 — ככל שגבוה יותר, אתה מוגן יותר</div>
    </div>
    <div class="sevbar">
      <div class="sev-pill red"><b>${counts.critical}</b><span>קריטי</span></div>
      <div class="sev-pill orange"><b>${counts.warn}</b><span>לתיקון</span></div>
      <div class="sev-pill green"><b>${counts.ok}</b><span>תקין</span></div>
    </div>
    <h2>הממצאים שלך</h2>
    ${cardsHtml}
    ${!isPremium ? paywallHtml(counts.critical + counts.warn - 1) : ""}
    <div class="monitor-card">
      <h3>🛰️ ניטור מתמשך ${isPremium ? "" : "👑"}</h3>
      <p>נתריע לך אוטומטית כשהמייל שלך יופיע בדליפה חדשה — לפני שיהיה מאוחר.</p>
      <button id="btnMonitor" class="${isPremium && localStorage.getItem('tzel.monitor')==='1' ? 'on' : ''}">${isPremium ? (localStorage.getItem('tzel.monitor')==='1' ? '✓ ניטור פעיל' : 'הפעל ניטור') : '👑 בפרימיום'}</button>
    </div>`;

  wireResults();
  show("results");
}

function findingCard(f, idx, locked) {
  return `<div class="finding ${locked ? "" : ""}" data-idx="${idx}">
    <div class="row">
      <span class="sev-dot ${SEV_CLASS[f.sev]}"></span>
      <div class="info ${locked ? "locked" : ""}">
        <div class="title">${f.icon} ${esc(f.title)}</div>
        <div class="meta">${esc(SEV_LABEL[f.sev])} · ${esc(f.meta)}</div>
      </div>
      <span class="chev">▸</span>
    </div>
    <div class="detail"><div class="detail-in ${locked ? "locked" : ""}">
      <p>${esc(f.body)}</p>
      <div class="fix-title">🛠️ איך מתקנים</div>
      ${f.fixes.map((s, i) => `<div class="fix-step"><span class="n">${i + 1}</span><span>${esc(s)}</span></div>`).join("")}
      ${f.link ? `<a class="fix-link" href="${f.link.url}" target="_blank" rel="noopener">${esc(f.link.label)} ↗</a>` : ""}
    </div></div>
  </div>`;
}

function paywallHtml(n) {
  return `<div class="paywall">
    <div class="lock">🔒</div>
    <h3>עוד ${n} ממצאים ממתינים לך</h3>
    <p>ראית את הממצא הקריטי הראשון. פתח את הדוח המלא — כל הדליפות, כל צעדי ההגנה, וניטור מתמשך שמתריע על דליפות חדשות.</p>
    <button class="cta" id="btnUnlock">👑 פתח את הדוח המלא — ₪19.90/חודש</button>
    <div class="code">
      <button id="btnHaveCode">יש לי קוד גישה מוקדמת</button>
      <div id="codeBox" hidden style="margin-top:8px">
        <input id="unlockCode" placeholder="קוד גישה">
        <button id="btnApplyCode" style="text-decoration:none;color:var(--cyan);font-weight:700;margin-top:6px">הפעל</button>
      </div>
    </div>
  </div>`;
}

function wireResults() {
  document.querySelectorAll(".finding").forEach(card =>
    card.querySelector(".row").addEventListener("click", () => card.classList.toggle("open")));

  const unlock = $("btnUnlock");
  if (unlock) unlock.addEventListener("click", () => toast("💳 התשלום ייפתח בקרוב — בינתיים יש קוד גישה מוקדמת"));
  const have = $("btnHaveCode");
  if (have) have.addEventListener("click", () => { $("codeBox").hidden = !$("codeBox").hidden; });
  const apply = $("btnApplyCode");
  if (apply) apply.addEventListener("click", () => {
    const code = ($("unlockCode").value || "").trim().toUpperCase();
    if (UNLOCK_CODES.includes(code)) {
      isPremium = true; localStorage.setItem("tzel.premium", "1");
      toast("👑 פרימיום הופעל! הדוח המלא נפתח");
      renderResults(lastReport);
    } else toast("קוד לא מוכר");
  });
  const mon = $("btnMonitor");
  if (mon) mon.addEventListener("click", () => {
    if (!isPremium) { toast("ניטור מתמשך זמין בפרימיום 👑"); return; }
    const on = localStorage.getItem("tzel.monitor") === "1";
    localStorage.setItem("tzel.monitor", on ? "0" : "1");
    toast(on ? "הניטור כובה" : "🛰️ ניטור הופעל — נתריע על דליפות חדשות");
    renderResults(lastReport);
  });
}

/* ---------- toast ---------- */
let toastTimer;
function toast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2600);}

/* ---------- wiring ---------- */
$("modeTag").textContent = "הדגמה"; // יתחלף ל"מחובר ●" אחרי סריקה מוצלחת מול השרת
$("btnScan").addEventListener("click", runScan);
$("fPhone").addEventListener("keydown", e => { if (e.key === "Enter") runScan(); });
$("btnRescan").addEventListener("click", () => show("home"));
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
show("home");
</script>
</body>
</html>
