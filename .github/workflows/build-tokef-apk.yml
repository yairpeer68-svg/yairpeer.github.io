name: Build Tokef APK

on:
  push:
    branches: [ "main", "claude/monetization-app-idea-prry2y" ]
    paths: [ "tokef-android/**", "tokef/**", ".github/workflows/build-tokef-apk.yml" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Copy web app into APK assets
        run: |
          mkdir -p tokef-android/app/src/main/assets
          cp -r tokef/* tokef-android/app/src/main/assets/

      - name: Build debug APK
        run: cd tokef-android && gradle assembleDebug --no-daemon

      - name: Rename APK
        run: cp tokef-android/app/build/outputs/apk/debug/app-debug.apk tokef.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokef-apk
          path: tokef.apk
          retention-days: 30

      # בכל דחיפה ל-main: מפרסם את ה-APK כ-Release ציבורי עם קישור הורדה ישיר
      - name: Publish latest APK as release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tokef-latest
          name: "תוקף — גרסה אחרונה (APK)"
          body: |
            📱 הגרסה האחרונה של אפליקציית תוקף לאנדרואיד.

            **התקנה:** הורד את `tokef.apk` מלמטה, פתח אותו בטלפון ואשר התקנה ממקור לא מוכר.

            🛡️ שום דבר לא יפוג לך יותר.
          files: tokef.apk
          prerelease: false
          make_latest: true
