name: Build Sherlock APK

on:
  push:
    branches: [ "claude/sherlock-android-app-yrcphh" ]
    paths: [ "sherlock-android/**" ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: false
        default: 'claude/sherlock-android-app-yrcphh'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('sherlock-android/**/*.gradle*') }}

      - name: Grant execute permission for gradlew
        run: chmod +x sherlock-android/gradlew

      - name: Build debug APK
        run: cd sherlock-android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sherlock-debug-apk
          path: sherlock-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
