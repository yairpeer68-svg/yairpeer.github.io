name: Build Tzel APK

on:
  push:
    branches: [ "main", "claude/monetization-app-idea-prry2y" ]
    paths: [ "tzel-android/**", ".github/workflows/build-tzel-apk.yml" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: cd tzel-android && gradle assembleDebug --no-daemon

      - name: Rename APK
        run: cp tzel-android/app/build/outputs/apk/debug/app-debug.apk tzel.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tzel-apk
          path: tzel.apk
          retention-days: 30

      - name: Publish latest APK as release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tzel-latest
          name: "צל דיגיטלי — גרסה אחרונה (APK)"
          body: |
            🕵️ הגרסה האחרונה של אפליקציית צל דיגיטלי לאנדרואיד.

            **התקנה:** הורד את `tzel.apk` מלמטה, פתח אותו בטלפון ואשר התקנה ממקור לא מוכר.

            🛡️ בדוק כמה אתה חשוף ברשת.
          files: tzel.apk
          prerelease: false
          make_latest: false
