name: Release Tokef AAB (Play Store)

# בנייה חתומה לחנות פליי — מופעלת ידנית מלשונית Actions.
# דורשת את הסודות: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify signing secrets exist
        env:
          KS: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS" ]; then
            echo "::error::חסרים סודות חתימה. הוסף את KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD ב-Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Copy web app into APK assets
        run: |
          mkdir -p tokef-android/app/src/main/assets
          cp -r tokef/* tokef-android/app/src/main/assets/

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

      - name: Build signed AAB
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: cd tokef-android && gradle bundleRelease --no-daemon

      - name: Build signed APK (להתקנה ישירה)
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: cd tokef-android && gradle assembleRelease --no-daemon

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: tokef-release-aab
          path: tokef-android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: tokef-release-apk
          path: tokef-android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
