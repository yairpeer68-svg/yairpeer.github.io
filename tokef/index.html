<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>תוקף — שום דבר לא יפוג לך יותר</title>
<meta name="description" content="כל התאריכים הביורוקרטיים שלך במקום אחד: טסט לרכב, ביטוח, דרכון, רישיון נהיגה, בדיקת גז — עם התראה חכמה לפני שפג התוקף.">
<meta property="og:title" content="תוקף — שום דבר לא יפוג לך יותר">
<meta property="og:description" content="טסט, דרכון, ביטוח, רישיון — אפליקציה חינמית שמתריעה לפני שפג התוקף. הנתונים נשמרים אצלך במכשיר.">
<meta name="theme-color" content="#071018">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #071018;
    --glow-1: rgba(29, 78, 216, .35);
    --glow-2: rgba(6, 182, 212, .16);
    --card: #0f1c29;
    --card-2: #15263a;
    --text: #eef6fb;
    --muted: #8aa3b8;
    --cyan: #22d3ee;
    --cyan-dark: #05242c;
    --blue: #1d4ed8;
    --teal: #06b6d4;
    --ok: #34d399;
    --warn: #fbbf24;
    --bad: #fb5f7d;
    --gold: #fbbf24;
    --border: #1e3247;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Rubik", -apple-system, "Segoe UI", Arial, sans-serif;
    background:
      radial-gradient(600px 400px at 85% -5%, var(--glow-1), transparent 70%),
      radial-gradient(500px 380px at -10% 30%, var(--glow-2), transparent 70%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 14px 16px 130px; }

  /* ---- top bar ---- */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 2px 4px; }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 18px; }
  .brand .shield { font-size: 22px; }
  .topbar .actions { display: flex; gap: 8px; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit;
  }
  .icon-btn.on { border-color: var(--cyan); box-shadow: 0 0 10px rgba(34, 211, 238, .3); }
  .icon-btn.gold { border-color: var(--gold); box-shadow: 0 0 10px rgba(251, 191, 36, .3); }
  #btnInstall { display: none; }

  /* ---- hero ---- */
  .hero {
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--blue), var(--teal));
    border-radius: 24px;
    padding: 22px 18px 20px;
    text-align: center;
    margin-top: 12px;
    box-shadow: 0 12px 40px rgba(29, 78, 216, .35);
  }
  .hero::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(320px 160px at 50% -20%, rgba(255,255,255,.22), transparent 70%);
    pointer-events: none;
  }
  .hero .big { font-size: 40px; }
  .hero h1 { font-size: 24px; font-weight: 900; color: #fff; margin: 6px 0 2px; }
  .hero p { font-size: 14px; color: rgba(255,255,255,.85); font-weight: 600; }
  .hero .trip-row { position: relative; margin-top: 12px; }
  .trip-btn {
    background: rgba(7, 16, 24, .5); border: 1px solid rgba(255,255,255,.25);
    color: #fff; border-radius: 999px; padding: 8px 18px;
    font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer;
  }

  /* ---- stats (premium) ---- */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
  .stat {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 10px 6px; text-align: center;
  }
  .stat .v { font-size: 17px; font-weight: 900; color: var(--cyan); }
  .stat .l { font-size: 10.5px; color: var(--muted); margin-top: 3px; }

  /* ---- profile chips ---- */
  .profiles { display: flex; gap: 6px; overflow-x: auto; padding: 2px; margin-top: 14px; scrollbar-width: none; }
  .profiles::-webkit-scrollbar { display: none; }
  .pchip {
    border: 1px solid var(--border); background: var(--card); color: var(--muted);
    border-radius: 999px; padding: 6px 13px; font-size: 13px; font-weight: 600;
    font-family: inherit; cursor: pointer; white-space: nowrap;
  }
  .pchip.on { border-color: var(--cyan); color: var(--text); }

  /* ---- sections ---- */
  h2 { font-size: 14px; color: var(--muted); font-weight: 600; margin: 20px 4px 10px; letter-spacing: .3px; }

  .item-card {
    display: flex; align-items: center; gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform .08s;
  }
  .item-card:active { transform: scale(.985); }
  .item-card .emoji {
    font-size: 24px; width: 48px; height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--card-2); border: 1px solid var(--border); border-radius: 14px;
  }
  .item-card .info { flex: 1; min-width: 0; }
  .item-card .name { font-weight: 800; font-size: 16px; }
  .item-card .meta { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .status { text-align: left; flex-shrink: 0; }
  .pill { font-size: 12px; font-weight: 800; border-radius: 999px; padding: 4px 12px; }
  .pill.ok   { background: rgba(52, 211, 153, .15); color: var(--ok); }
  .pill.warn { background: rgba(251, 191, 36, .15); color: var(--warn); }
  .pill.bad  { background: rgba(251, 95, 125, .18); color: var(--bad); }

  .empty { text-align: center; padding: 44px 20px; color: var(--muted); }
  .empty .big { font-size: 46px; margin-bottom: 12px; }
  .empty p { font-size: 15px; line-height: 1.7; }

  /* ---- fab ---- */
  .fab {
    position: fixed; bottom: max(24px, env(safe-area-inset-bottom)); inset-inline-start: 50%;
    transform: translateX(50%);
    background: var(--cyan); color: var(--cyan-dark);
    border: none; border-radius: 999px;
    font-size: 17px; font-weight: 800; font-family: inherit;
    padding: 16px 32px;
    box-shadow: 0 8px 28px rgba(34, 211, 238, .35);
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    z-index: 10;
  }
  .fab:active { transform: translateX(50%) scale(.97); }

  /* ---- dialogs ---- */
  dialog {
    border: 1px solid var(--border); border-bottom: none;
    border-radius: 22px 22px 0 0;
    background: var(--card); color: var(--text);
    width: 100%; max-width: 560px;
    max-height: 88vh;
    padding: 0;
    margin: auto auto 0;
    box-shadow: 0 -10px 50px rgba(0, 0, 0, .5);
  }
  dialog::backdrop { background: rgba(2, 8, 14, .75); }
  .dlg-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px 10px;
    position: sticky; top: 0; background: var(--card); z-index: 2;
  }
  .dlg-head h3 { font-size: 18px; font-weight: 800; }
  .dlg-close {
    background: var(--card-2); border: 1px solid var(--border); border-radius: 999px;
    width: 32px; height: 32px; font-size: 14px; cursor: pointer;
    color: var(--muted); font-family: inherit;
  }
  .dlg-body { padding: 0 18px 26px; overflow-y: auto; }

  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cat-item {
    background: var(--card-2); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 6px; text-align: center; cursor: pointer;
    font-family: inherit; color: var(--text);
  }
  .cat-item:active { border-color: var(--cyan); }
  .cat-item .e { font-size: 26px; display: block; margin-bottom: 4px; }
  .cat-item .n { font-size: 12.5px; font-weight: 600; display: block; }
  .custom-btn {
    width: 100%; margin-top: 18px;
    background: none; border: 2px dashed var(--border); border-radius: 14px;
    padding: 14px; font-size: 15px; font-weight: 600; color: var(--muted);
    cursor: pointer; font-family: inherit;
  }

  /* ---- form ---- */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--bg); color: var(--text);
    font-size: 16px; font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid var(--cyan); border-color: transparent; }
  .field textarea { resize: vertical; min-height: 44px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tip {
    background: rgba(34, 211, 238, .08); border: 1px solid rgba(34, 211, 238, .25);
    color: #9be5f4; border-radius: 12px; padding: 10px 14px;
    font-size: 13px; line-height: 1.6; margin-bottom: 14px;
  }
  .pro-tag { font-size: 10px; font-weight: 800; background: rgba(251, 191, 36, .18); color: var(--gold); border-radius: 6px; padding: 2px 6px; }
  .btn-primary {
    width: 100%; padding: 15px;
    background: var(--cyan); color: var(--cyan-dark);
    border: none; border-radius: 14px;
    font-size: 17px; font-weight: 800; font-family: inherit;
    cursor: pointer; margin-top: 6px;
  }
  .btn-secondary {
    width: 100%; padding: 13px;
    background: var(--card-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 14px;
    font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; margin-top: 8px;
  }
  .btn-ghost {
    width: 100%; padding: 13px;
    background: none; color: var(--muted);
    border: none; font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; margin-top: 8px;
  }
  .btn-danger {
    width: 100%; padding: 13px;
    background: none; color: var(--bad);
    border: none; font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer; margin-top: 8px;
  }
  .renew-link, .compare-link {
    display: block; text-align: center; margin-top: 10px;
    color: var(--cyan); font-size: 14px; font-weight: 600; text-decoration: none;
  }
  .compare-link { color: var(--gold); }
  .doc-thumb { max-width: 100%; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; display: block; }
  .hist-item {
    display: flex; gap: 8px; color: var(--muted); font-size: 13px;
    padding: 6px 4px; border-bottom: 1px dashed var(--border);
  }
  .hist-item .up { color: var(--bad); font-weight: 700; }
  .hist-item .down { color: var(--ok); font-weight: 700; }

  /* ---- wizard ---- */
  .wiz-step { text-align: center; padding: 8px 0 4px; }
  .wiz-step .big { font-size: 52px; }
  .wiz-step h4 { font-size: 22px; font-weight: 900; margin: 10px 0 4px; }
  .wiz-step p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
  .wiz-progress { display: flex; justify-content: center; gap: 6px; margin-bottom: 14px; }
  .wiz-progress span { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
  .wiz-progress span.on { background: var(--cyan); }

  /* ---- premium ---- */
  .prem-hero {
    background: linear-gradient(135deg, rgba(251, 191, 36, .16), rgba(6, 182, 212, .12));
    border: 1px solid rgba(251, 191, 36, .4);
    border-radius: 16px; padding: 18px; text-align: center; margin-bottom: 14px;
  }
  .prem-hero .crown { font-size: 36px; }
  .prem-hero h4 { font-size: 20px; font-weight: 900; margin: 6px 0 2px; }
  .prem-hero p { font-size: 13px; color: var(--muted); }
  .feat-list { list-style: none; margin: 4px 0 14px; }
  .feat-list li { display: flex; gap: 9px; align-items: flex-start; font-size: 14px; padding: 6px 2px; }
  .feat-list li::before { content: "✓"; color: var(--cyan); font-weight: 900; }
  .price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
  .price-card {
    background: var(--card-2); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px; text-align: center;
  }
  .price-card .p { font-size: 22px; font-weight: 900; color: var(--gold); }
  .price-card .l { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .prem-note { font-size: 12px; color: var(--muted); text-align: center; margin: 10px 0; line-height: 1.6; }
  .prof-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; margin-bottom: 8px; font-size: 15px; font-weight: 600;
  }
  .prof-row .n { flex: 1; }
  .prof-row button { background: none; border: none; color: var(--bad); cursor: pointer; font-family: inherit; font-size: 13px; }

  /* ---- trip report ---- */
  .trip-row-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 11px 14px; margin-bottom: 8px; font-size: 14px;
  }
  .trip-row-item .t { flex: 1; }
  .trip-row-item .s { font-weight: 800; }
  .trip-row-item .s.ok { color: var(--ok); }
  .trip-row-item .s.warn { color: var(--warn); }
  .trip-row-item .s.bad { color: var(--bad); }

  /* ---- toast ---- */
  .toast {
    position: fixed; bottom: 96px; inset-inline-start: 50%;
    transform: translateX(50%);
    background: var(--cyan); color: var(--cyan-dark);
    padding: 10px 20px; border-radius: 999px;
    font-size: 14px; font-weight: 800;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
    z-index: 50;
    box-shadow: 0 6px 20px rgba(34, 211, 238, .3);
  }
  .toast.show { opacity: 1; }

  footer { text-align: center; margin-top: 32px; font-size: 12px; color: var(--muted); line-height: 1.8; opacity: .8; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="shield">🛡️</span> תוקף</div>
    <div class="actions">
      <button class="icon-btn" id="btnCrown" title="תוקף פרימיום">👑</button>
      <button class="icon-btn" id="btnInstall" title="התקנה על מסך הבית">⬇️</button>
      <button class="icon-btn" id="btnBell" title="התראות לפני פקיעה">🔔</button>
    </div>
  </div>

  <div class="hero" id="hero">
    <div class="big" id="heroIcon">🛡️</div>
    <h1 id="heroTitle">הכל בתוקף</h1>
    <p id="heroSub">שום דבר לא יפוג לך יותר</p>
    <div class="trip-row">
      <button class="trip-btn" id="btnTrip">✈️ בדיקת נסיעה — כולם מוכנים לטיסה?</button>
    </div>
  </div>

  <div class="stats" id="statsRow" hidden></div>

  <div class="profiles" id="profileChips" hidden></div>

  <h2 id="listTitle" hidden>הדברים שלי</h2>
  <div id="list"></div>

  <div class="empty" id="empty">
    <div class="big">🗂️</div>
    <p>טסט, דרכון, ביטוח, רישיון…<br>הוסף את התאריכים שלך ותקבל התראה לפני שהם פגים.</p>
  </div>

  <footer>
    הנתונים נשמרים רק אצלך במכשיר — לא נשלחים לשום שרת.<br>
    <a href="privacy.html">מדיניות פרטיות</a>
  </footer>
</div>

<button class="fab" id="fabAdd">➕ הוסף תוקף</button>

<!-- catalog -->
<dialog id="dlgCatalog">
  <div class="dlg-head">
    <h3>מה להוסיף?</h3>
    <button class="dlg-close" data-close="dlgCatalog">✕</button>
  </div>
  <div class="dlg-body">
    <div id="catList" class="cat-grid"></div>
    <button class="custom-btn" id="btnCustom">➕ משהו אחר עם תאריך תפוגה</button>
  </div>
</dialog>

<!-- add / edit form -->
<dialog id="dlgForm">
  <div class="dlg-head">
    <h3 id="formTitle">הוספה</h3>
    <button class="dlg-close" data-close="dlgForm">✕</button>
  </div>
  <div class="dlg-body">
    <div class="tip" id="fTip" hidden></div>
    <div class="field">
      <label for="fName">שם</label>
      <input id="fName" type="text" maxlength="40" placeholder="למשל: דרכון של יאיר">
    </div>
    <div class="row2">
      <div class="field">
        <label for="fExpiry">תאריך תפוגה</label>
        <input id="fExpiry" type="date">
      </div>
      <div class="field">
        <label for="fProfile">של מי? <span class="pro-tag">👑</span></label>
        <select id="fProfile"></select>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label for="fLead">להתריע לפני</label>
        <select id="fLead">
          <option value="14">שבועיים</option>
          <option value="30" selected>חודש</option>
          <option value="60">חודשיים</option>
          <option value="90">3 חודשים</option>
          <option value="210">7 חודשים (לדרכון)</option>
          <option value="custom">מותאם אישית 👑</option>
        </select>
      </div>
      <div class="field" id="fieldCustomLead" hidden>
        <label for="fCustomLead">ימים</label>
        <input id="fCustomLead" type="number" min="1" max="365" placeholder="45">
      </div>
    </div>
    <div class="field" id="fieldRenewPrice" hidden>
      <label for="fRenewPrice">כמה שילמת על החידוש? (₪, לא חובה)</label>
      <input id="fRenewPrice" type="number" min="0" step="1" placeholder="0">
    </div>
    <div class="field">
      <label for="fNote">הערה <span class="pro-tag">👑</span></label>
      <textarea id="fNote" maxlength="200" placeholder="למשל: הפוליסה אצל סוכן משה"></textarea>
    </div>
    <div class="field" id="fieldDoc">
      <label>מסמך מצורף <span class="pro-tag">👑</span></label>
      <img class="doc-thumb" id="docThumb" hidden alt="מסמך מצורף">
      <input id="fDoc" type="file" accept="image/*">
    </div>
    <div id="histBox"></div>
    <button class="btn-primary" id="btnSave">שמירה</button>
    <button class="btn-secondary" id="btnRenewed" hidden>✅ חידשתי! — עדכון תאריך</button>
    <button class="btn-secondary" id="btnSnooze" hidden>😴 השתק התראות לשבוע</button>
    <a class="compare-link" id="fCompare" target="_blank" rel="noopener" hidden></a>
    <a class="renew-link" id="fLink" target="_blank" rel="noopener" hidden>🔗 לחידוש באתר הרשמי</a>
    <button class="btn-danger" id="btnDelete" hidden>🗑️ מחיקה</button>
  </div>
</dialog>

<!-- onboarding wizard -->
<dialog id="dlgWiz">
  <div class="dlg-head">
    <h3>ברוך הבא לתוקף 🛡️</h3>
    <button class="dlg-close" id="wizClose">✕</button>
  </div>
  <div class="dlg-body" id="wizBody"></div>
</dialog>

<!-- trip check -->
<dialog id="dlgTrip">
  <div class="dlg-head">
    <h3>✈️ בדיקת נסיעה</h3>
    <button class="dlg-close" data-close="dlgTrip">✕</button>
  </div>
  <div class="dlg-body" id="tripBody"></div>
</dialog>

<!-- premium -->
<dialog id="dlgPremium">
  <div class="dlg-head">
    <h3>תוקף פרימיום</h3>
    <button class="dlg-close" data-close="dlgPremium">✕</button>
  </div>
  <div class="dlg-body" id="premBody"></div>
</dialog>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* ---------- catalog ---------- */
const CATALOG = [
  { name: "טסט לרכב", emoji: "🚗", lead: 30,
    tip: "אפשר לעשות טסט עד חודש לפני מועד הפקיעה בלי לאבד ימים.",

function loadJSON(key, fallback) {
  try {
    const v = JSON.parse(localStorage.getItem(key));
    return v == null ? fallback : v;
  } catch { return fallback; }
}
function save() {
  localStorage.setItem(K_ITEMS, JSON.stringify(items));
  localStorage.setItem(K_PROF, JSON.stringify(profiles));
  localStorage.setItem(K_SET, JSON.stringify(settings));
  idbSet("items", items).catch(() => {});
}

/* ---------- IndexedDB ---------- */
function idb() {
  return new Promise((res, rej) => {
    const req = indexedDB.open("tokef", 1);
    req.onupgradeneeded = () => req.result.createObjectStore("kv");
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
function idbSet(key, val) {
  return idb().then(db => new Promise((res, rej) => {
    const tx = db.transaction("kv", "readwrite");
    tx.objectStore("kv").put(typeof val === "string" ? val : JSON.parse(JSON.stringify(val)), key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  }));
}
function idbGet(key) {
  return idb().then(db => new Promise((res, rej) => {
    const r = db.transaction("kv").objectStore("kv").get(key);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  }));
}
function idbDel(key) {
  return idb().then(db => new Promise((res, rej) => {
    const tx = db.transaction("kv", "readwrite");
    tx.objectStore("kv").delete(key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  }));
}

/* ---------- date helpers ---------- */
function startOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function daysLeft(it) {
  return Math.round((new Date(it.expiry + "T00:00:00") - startOfDay(new Date())) / 86400000);
}
function toISO(d) {
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
const dateFmt = new Intl.DateTimeFormat("he-IL", { day: "numeric", month: "long", year: "numeric" });

function statusOf(it) {
  const d = daysLeft(it);
  if (d < 0) return { cls: "bad", label: "פג תוקף!", order: 0 };
  if (d === 0) return { cls: "bad", label: "פג היום!", order: 0 };
  if (d <= (it.lead || 30)) return { cls: "warn", label: d === 1 ? "פג מחר" : "עוד " + d + " ימים", order: 1 };
  return { cls: "ok", label: "בתוקף", order: 2 };
}

const $ = id => document.getElementById(id);
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function profOf(id) { return profiles.find(p => p.id === id) || profiles[0]; }

/* ---------- rendering ---------- */
function render() {
  const attention = items.filter(it => statusOf(it).order < 2);
  if (items.length === 0) {
    $("heroIcon").textContent = "🛡️";
    $("heroTitle").textContent = "תוקף";
    $("heroSub").textContent = "שום דבר לא יפוג לך יותר";
  } else if (attention.length === 0) {
    $("heroIcon").textContent = "✅";
    $("heroTitle").textContent = "הכל בתוקף";
    $("heroSub").textContent = items.length + " פריטים במעקב — תנוח בראש שקט";
  } else {
    $("heroIcon").textContent = "⚠️";
    $("heroTitle").textContent = attention.length === 1 ? "פריט אחד דורש טיפול" : attention.length + " פריטים דורשים טיפול";
    $("heroSub").textContent = "לחץ עליהם למטה כדי לטפל עכשיו";
  }
  $("btnCrown").classList.toggle("gold", settings.premium);

  renderStats(attention);
  renderProfiles();
  renderList();

  $("listTitle").hidden = items.length === 0;
  $("empty").style.display = items.length === 0 ? "" : "none";
}

function renderStats(attention) {
  const show = settings.premium && items.length > 0;
  $("statsRow").hidden = !show;
  if (!show) return;
  const next = [...items].filter(it => daysLeft(it) >= 0).sort((a, b) => daysLeft(a) - daysLeft(b))[0];
  const renewals = items.reduce((s, it) => s + (it.hist || []).length, 0);
  $("statsRow").innerHTML = `
    <div class="stat"><div class="v">${items.length}</div><div class="l">במעקב</div></div>
    <div class="stat"><div class="v">${attention.length}</div><div class="l">דורשים טיפול</div></div>
    <div class="stat"><div class="v">${next ? daysLeft(next) : "—"}</div><div class="l">${next ? "ימים ל" + esc(next.name).slice(0, 10) : "אין קרוב"}</div></div>
    <div class="stat"><div class="v">${renewals}</div><div class="l">חידושים בוצעו</div></div>`;
}

function renderProfiles() {
  const show = settings.premium && (profiles.length > 1 || items.length > 0);
  $("profileChips").hidden = !show;
  if (!show) { activeProfile = ""; return; }
  if (activeProfile && !profiles.some(p => p.id === activeProfile)) activeProfile = "";
  $("profileChips").innerHTML =
    `<button class="pchip ${!activeProfile ? "on" : ""}" data-p="">הכל</button>` +
    profiles.map(p =>
      `<button class="pchip ${activeProfile === p.id ? "on" : ""}" data-p="${p.id}">${esc(p.emoji)} ${esc(p.name)}</button>`
    ).join("") +
    `<button class="pchip" data-p="__add">➕</button>`;
}

function renderList() {
  const shown = (activeProfile ? items.filter(it => it.profile === activeProfile) : [...items])
    .sort((a, b) => {
      const sa = statusOf(a), sb = statusOf(b);
      return sa.order - sb.order || daysLeft(a) - daysLeft(b);
    });
  $("list").innerHTML = shown.map(it => {
    const st = statusOf(it);
    const who = settings.premium && profiles.length > 1 ? " · " + esc(profOf(it.profile).emoji) + " " + esc(profOf(it.profile).name) : "";
    const extras = (it.note ? " 📝" : "") + (it.doc ? " 📎" : "");
    return `<div class="item-card" data-id="${it.id}">
      <div class="emoji">${esc(it.emoji)}</div>
      <div class="info">
        <div class="name">${esc(it.name)}</div>
        <div class="meta">עד ${dateFmt.format(new Date(it.expiry + "T00:00:00"))}${who}${extras}</div>
      </div>
      <div class="status"><span class="pill ${st.cls}">${st.label}</span></div>
    </div>`;
  }).join("");
}

  $("fNote").value = preset.note || "";
  $("fieldRenewPrice").hidden = true;
  $("fRenewPrice").value = "";
  $("fDoc").value = "";

  // profile select
  $("fProfile").innerHTML = profiles.map(p => `<option value="${p.id}">${esc(p.emoji)} ${esc(p.name)}</option>`).join("");
  $("fProfile").value = preset.profile || "me";

  // lead select
  const lead = preset.lead || 30;
  const standard = ["14", "30", "60", "90", "210"];
  if (standard.includes(String(lead))) {
    $("fLead").value = String(lead);
    $("fieldCustomLead").hidden = true;
  } else {
    $("fLead").value = "custom";
    $("fieldCustomLead").hidden = false;
    $("fCustomLead").value = lead;
  }

  // attached doc thumbnail
  $("docThumb").hidden = true;
  if (editId && preset.doc) {
    const data = await idbGet("doc:" + editId).catch(() => null);
    if (data) { $("docThumb").src = data; $("docThumb").hidden = false; }
  }

  // history
  const hist = preset.hist || [];
  $("histBox").innerHTML = hist.length && settings.premium
    ? `<div class="field"><label>היסטוריית חידושים 👑</label>` + hist.map(h => {
        let price = "";
        if (h.price != null) {
          const prev = hist[hist.indexOf(h) - 1];
          if (prev && prev.price != null && prev.price > 0) {
            const pct = Math.round(((h.price - prev.price) / prev.price) * 100);
            price = ` — ₪${h.price} <span class="${pct > 0 ? "up" : "down"}">(${pct > 0 ? "+" : ""}${pct}%)</span>`;
          } else price = ` — ₪${h.price}`;
        }
        return `<div class="hist-item"><span>🔄</span><span>חודש ב-${dateFmt.format(new Date(h.at + "T00:00:00"))}${price}</span></div>`;
      }).join("") + `</div>`
    : "";

  const cmp = preset.compare;
  $("fCompare").hidden = !cmp;
  if (cmp) { $("fCompare").textContent = cmp.label; $("fCompare").href = cmp.url; }
  $("fLink").hidden = !preset.link;
  if (preset.link) $("fLink").href = preset.link;

  $("btnDelete").hidden = !editId;
  $("btnRenewed").hidden = !editId;
  $("btnSnooze").hidden = !editId || statusOf(preset).order === 2;
  $("dlgForm")._emoji = preset.emoji || "📄";
  $("dlgForm")._tip = preset.tip || "";
  $("dlgForm")._link = preset.link || "";
  $("dlgForm")._compare = preset.compare || null;
  $("dlgForm")._travel = preset.travel || "";
  $("dlgForm").showModal();
  if (!editId && !preset.name) $("fName").focus();
}

function leadValue() {
  if ($("fLead").value === "custom") return Math.max(1, parseInt($("fCustomLead").value, 10) || 30);
  return parseInt($("fLead").value, 10) || 30;
}

async function saveForm() {
  const name = $("fName").value.trim();
  const expiry = $("fExpiry").value;
  if (!name) { toast("צריך לתת שם"); $("fName").focus(); return; }
  if (!expiry) { toast("צריך לבחור תאריך תפוגה"); $("fExpiry").focus(); return; }

  // premium gates
  if (!settings.premium) {
    if ($("fProfile").value !== "me") { openPremium("פרופילים משפחתיים"); return; }
    if ($("fNote").value.trim()) { openPremium("הערות"); return; }
    if ($("fLead").value === "custom") { openPremium("מרווח התראה מותאם"); return; }
    if ($("fDoc").files.length) { openPremium("צירוף מסמכים"); return; }
    if (!editId && items.length >= FREE_LIMIT) { openPremium("יותר מ-" + FREE_LIMIT + " פריטים"); return; }
  }

  const data = {
    name, expiry,
    lead: leadValue(),
    profile: $("fProfile").value,
    note: $("fNote").value.trim(),
  };

  let target;
  const wasEdit = !!editId;
  if (editId) {
    target = items.find(x => x.id === editId);
    if (target) {
      if (renewMode && target.expiry !== expiry) {
        target.hist = (target.hist || []).concat({
          at: toISO(new Date()),
          old: target.expiry,
          price: parseFloat($("fRenewPrice").value) || null,
        });
        target.snoozeUntil = null;
      }
      Object.assign(target, data);
    }
  } else {
    target = Object.assign({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      emoji: $("dlgForm")._emoji,
      tip: $("dlgForm")._tip,
      link: $("dlgForm")._link,
      compare: $("dlgForm")._compare,
      travel: $("dlgForm")._travel,
      hist: [],
    }, data);
    items.push(target);
  }

  // attach document
  if (target && $("fDoc").files.length) {
    const file = $("fDoc").files[0];
    const dataUrl = await new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.readAsDataURL(file);
    });
    await idbSet("doc:" + target.id, dataUrl).catch(() => {});
    target.doc = true;
  }

  save(); render();
  $("dlgForm").close();
  toast(renewMode ? "🎉 החידוש נרשם!" : wasEdit ? "נשמר ✓" : "נוסף למעקב ✓");
  editId = null; renewMode = false;
  checkExpiriesNow();
}

        toast("קוד לא מוכר — נסה שוב");
      }
    });
  }
  $("dlgPremium").showModal();
}

function renderProfList() {
  $("profList").innerHTML = profiles.map(p =>
    `<div class="prof-row"><span>${esc(p.emoji)}</span><span class="n">${esc(p.name)}</span>
      ${p.id !== "me" ? `<button data-delprof="${p.id}">הסרה</button>` : ""}</div>`).join("");
  $("profList").querySelectorAll("[data-delprof]").forEach(btn =>
    btn.addEventListener("click", () => {
      const id = btn.dataset.delprof;
      const used = items.filter(it => it.profile === id).length;
      if (used && !confirm(`יש ${used} פריטים של הפרופיל הזה — הם יעברו אליך. להמשיך?`)) return;
      items.forEach(it => { if (it.profile === id) it.profile = "me"; });
      profiles = profiles.filter(p => p.id !== id);
      save(); render(); renderProfList();
    }));
}

/* ---------- ICS export ---------- */
function exportIcs() {
  const lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Tokef//He//IL"];
  for (const it of items) {
    const d = it.expiry.replace(/-/g, "");
    lines.push("BEGIN:VEVENT",
      "UID:" + it.id + "@tokef",
      "DTSTART;VALUE=DATE:" + d,
      "SUMMARY:⏰ פג תוקף: " + it.name.replace(/[,;]/g, " "),
      "DESCRIPTION:נוצר על ידי אפליקציית תוקף",
      "BEGIN:VALARM", "TRIGGER:-P" + (it.lead || 30) + "D", "ACTION:DISPLAY",
      "DESCRIPTION:תזכורת חידוש: " + it.name.replace(/[,;]/g, " "), "END:VALARM",
      "END:VEVENT");
  }
  lines.push("END:VCALENDAR");
  download(new Blob([lines.join("\r\n")], { type: "text/calendar" }), "tokef.ics");
  toast("קובץ היומן ירד — פתח אותו והוא ייכנס ליומן ✓");
}

/* ---------- backup ---------- */
function exportBackup() {
  const data = { app: "tokef", version: 1, exportedAt: new Date().toISOString(), items, profiles, settings };
  download(new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }),
    "tokef-backup-" + toISO(new Date()) + ".json");
  toast("קובץ הגיבוי ירד — שמור אותו במקום בטוח ✓");
}
function importBackup(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const data = JSON.parse(r.result);
      if (data.app !== "tokef" || !Array.isArray(data.items)) throw new Error("bad");
      if (!confirm(`לשחזר ${data.items.length} פריטים? הנתונים הנוכחיים יוחלפו.`)) return;
      items = data.items;
      profiles = Array.isArray(data.profiles) && data.profiles.length ? data.profiles : profiles;
      settings = Object.assign(settings, data.settings || {}, { premium: settings.premium || (data.settings || {}).premium });
      save(); render();
      $("dlgPremium").close();
      toast("הגיבוי שוחזר ✓");
    } catch { toast("קובץ גיבוי לא תקין"); }
  };
  r.readAsText(file);
}
function download(blob, name) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ---------- trip check ---------- */
function openTrip() {
  if (!settings.premium) { openPremium("בדיקת נסיעה"); return; }
  const b = $("tripBody");
  b.innerHTML = `
    <div class="field"><label for="tripDate">מתי הטיסה?</label><input id="tripDate" type="date" value="${toISO(new Date(Date.now() + 30 * 86400000))}"></div>
    <button class="btn-primary" id="btnTripCheck">בדוק את כולם</button>
    <div id="tripReport" style="margin-top:14px"></div>`;
  $("btnTripCheck").addEventListener("click", () => {
    const td = $("tripDate").value;
    if (!td) { toast("בחר תאריך"); return; }
    const trip = new Date(td + "T00:00:00");
    const rows = [];
    const travelDocs = items.filter(it => it.travel);
    if (!travelDocs.length) rows.push(`<div class="trip-row-item"><span class="t">לא נמצאו דרכונים או ויזות במעקב — הוסף אותם קודם</span></div>`);
    for (const it of travelDocs) {
      const exp = new Date(it.expiry + "T00:00:00");
      const who = profiles.length > 1 ? profOf(it.profile).emoji + " " + profOf(it.profile).name + " — " : "";
      if (it.travel === "passport") {
        const need = new Date(trip); need.setDate(need.getDate() + 180);
        if (exp < trip) rows.push(row(it, who, "bad", "פג לפני הטיסה! ✕"));
        else if (exp < need) rows.push(row(it, who, "warn", "פחות מ-6 חודשים ⚠️"));
        else rows.push(row(it, who, "ok", "מוכן לטיסה ✓"));
      } else {
        rows.push(exp < trip ? row(it, who, "bad", "פג לפני הטיסה! ✕") : row(it, who, "ok", "בתוקף ✓"));
      }
    }
    // דברים שיפוגו בזמן שאתה בחו"ל (עד שבועיים אחרי)
    const during = items.filter(it => !it.travel).filter(it => {
      const exp = new Date(it.expiry + "T00:00:00");
      const end = new Date(trip); end.setDate(end.getDate() + 14);
      return exp >= startOfDay(new Date()) && exp <= end;
    });
    if (during.length) {
      rows.push(`<h2 style="margin:14px 4px 8px">שים לב — יפוגו סביב הנסיעה:</h2>`);
      for (const it of during) rows.push(row(it, "", "warn", "עד " + dateFmt.format(new Date(it.expiry + "T00:00:00"))));
    }
    $("tripReport").innerHTML = rows.join("");
  });
  $("dlgTrip").showModal();

  function row(it, who, cls, label) {
    return `<div class="trip-row-item"><span>${esc(it.emoji)}</span><span class="t">${esc(who)}${esc(it.name)}</span><span class="s ${cls}">${label}</span></div>`;
  }
}

/* ---------- toast ---------- */
let toastTimer;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
}

/* ---------- wizard ---------- */
let wizIndex = 0;
function openWizard() {
  wizIndex = 0;
  renderWizStep();
  $("dlgWiz").showModal();
}
function renderWizStep() {
  const body = $("wizBody");
  if (wizIndex >= WIZARD_STEPS.length) {
    body.innerHTML = `<div class="wiz-step">
      <div class="big">🎉</div>
      <h4>מעולה, אתה מוגן!</h4>
      <p>אפשר להוסיף עוד דברים בכל רגע — בדיקת גז, ויזה, חיסון לכלב ועוד.<br>אל תשכח להפעיל התראות בפעמון 🔔</p>
      <button class="btn-primary" id="wizDone">סיימנו</button>
    </div>`;
    $("wizDone").addEventListener("click", finishWizard);
    return;
  }
  const c = CATALOG.find(x => x.name === WIZARD_STEPS[wizIndex]);
  body.innerHTML = `
    <div class="wiz-progress">${WIZARD_STEPS.map((_, i) => `<span class="${i <= wizIndex ? "on" : ""}"></span>`).join("")}</div>
    <div class="wiz-step">
      <div class="big">${esc(c.emoji)}</div>
      <h4>${esc(c.name)} — יש לך?</h4>
      <p>מתי פג התוקף? (אפשר בערך — תמיד אפשר לעדכן)</p>
    </div>
    <div class="field"><input id="wizDate" type="date"></div>
    <button class="btn-primary" id="wizSave">שמור והמשך</button>
    <button class="btn-ghost" id="wizSkip">אין לי / דלג</button>`;
  $("wizSave").addEventListener("click", () => {
    const d = $("wizDate").value;
    if (!d) { toast("בחר תאריך או דלג"); return; }
    items.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      name: c.name, emoji: c.emoji, expiry: d, lead: c.lead,
      tip: c.tip || "", link: c.link || "", compare: c.compare || null, travel: c.travel || "",
      profile: "me", hist: [],
    });
    save(); render();
    wizIndex++; renderWizStep();
  });
  $("wizSkip").addEventListener("click", () => { wizIndex++; renderWizStep(); });
}
function finishWizard() {
  localStorage.setItem(K_WIZ, "1");
  $("dlgWiz").close();
  checkExpiriesNow();
}
$("wizClose").addEventListener("click", finishWizard);

/* ---------- PWA ---------- */
let swReg = null;
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").then(r => { swReg = r; checkExpiriesNow(); }).catch(() => {});
}
let installPrompt = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  installPrompt = e;
  $("btnInstall").style.display = "flex";
});
$("btnInstall").addEventListener("click", async () => {
  if (!installPrompt) return;
  installPrompt.prompt();
  const { outcome } = await installPrompt.userChoice;
  if (outcome === "accepted") { $("btnInstall").style.display = "none"; toast("תוקף הותקן 🎉"); }
  installPrompt = null;
});

/* ---------- notifications ---------- */
function bellState() {
  $("btnBell").classList.toggle("on", "Notification" in window && Notification.permission === "granted");
}
$("btnBell").addEventListener("click", async () => {
  if (!("Notification" in window)) { toast("הדפדפן לא תומך בהתראות"); return; }
  if (Notification.permission === "granted") { toast("התראות פעילות ✓"); return; }
  if (Notification.permission === "denied") { toast("ההתראות חסומות — אפשר לאפשר בהגדרות הדפדפן"); return; }
  const perm = await Notification.requestPermission();
  bellState();
  if (perm === "granted") {
    toast("מעולה! נתריע לפני כל פקיעה 🔔");
    checkExpiriesNow();
    try {
      const status = await navigator.permissions.query({ name: "periodic-background-sync" });
      if (status.state === "granted" && swReg && "periodicSync" in swReg) {
        await swReg.periodicSync.register("check-expiries", { minInterval: 12 * 60 * 60 * 1000 });
      }
    } catch {}
  }
});
function checkExpiriesNow() {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  idbSet("items", items).catch(() => {});
  if (navigator.serviceWorker.controller) navigator.serviceWorker.controller.postMessage("check-expiries");
}
document.addEventListener("visibilitychange", () => { if (!document.hidden) checkExpiriesNow(); });

/* ---------- wiring ---------- */
$("fabAdd").addEventListener("click", () => {
  if (!settings.premium && items.length >= FREE_LIMIT) { openPremium("יותר מ-" + FREE_LIMIT + " פריטים"); return; }
  renderCatalog();
  $("dlgCatalog").showModal();
});
$("catList").addEventListener("click", e => {
  const btn = e.target.closest(".cat-item");
  if (!btn) return;
  $("dlgCatalog").close();
  openForm(CATALOG[parseInt(btn.dataset.i, 10)]);
});
$("btnCustom").addEventListener("click", () => {
  $("dlgCatalog").close();
  openForm({});
});
$("list").addEventListener("click", e => {
  const card = e.target.closest(".item-card");
  if (!card) return;
  const it = items.find(x => x.id === card.dataset.id);
  if (it) openForm(it);
});
$("profileChips").addEventListener("click", e => {
  const chip = e.target.closest(".pchip");
  if (!chip) return;
  if (chip.dataset.p === "__add") { openPremium(""); return; }
  activeProfile = chip.dataset.p;
  render();
});
$("fLead").addEventListener("change", () => {
  $("fieldCustomLead").hidden = $("fLead").value !== "custom";
});
$("btnSave").addEventListener("click", saveForm);
$("btnRenewed").addEventListener("click", () => {
  if (!settings.premium) { openPremium("היסטוריית חידושים"); return; }
  renewMode = true;
  $("fExpiry").value = "";
  $("fieldRenewPrice").hidden = false;
  $("fExpiry").focus();
  toast("הזן את תאריך התפוגה החדש ולחץ שמירה");
});
$("btnSnooze").addEventListener("click", () => {
  if (!settings.premium) { openPremium("השתקת התראות"); return; }
  const it = items.find(x => x.id === editId);
  if (!it) return;
  const d = new Date(); d.setDate(d.getDate() + 7);
  it.snoozeUntil = toISO(d);
  save();
  $("dlgForm").close();
  toast("😴 מושתק לשבוע — נזכיר שוב אחרי");
  checkExpiriesNow();
});
$("fCompare").addEventListener("click", () => {
  settings.compareClicks = (settings.compareClicks || 0) + 1;
  save();
});
$("btnDelete").addEventListener("click", () => {
  if (!editId) return;
  const it = items.find(x => x.id === editId);
  if (it && !confirm(`למחוק את "${it.name}"?`)) return;
  idbDel("doc:" + editId).catch(() => {});
  items = items.filter(x => x.id !== editId);
  editId = null;
  save(); render();
  $("dlgForm").close();
  toast("נמחק");
});
$("btnCrown").addEventListener("click", () => openPremium(""));
$("btnTrip").addEventListener("click", openTrip);
document.querySelectorAll("[data-close]").forEach(b =>
  b.addEventListener("click", () => $(b.dataset.close).close()));

bellState();
idbSet("items", items).catch(() => {});
render();

if (!localStorage.getItem(K_WIZ) && items.length === 0) {
  openWizard();
}
</script>
</body>
</html>
